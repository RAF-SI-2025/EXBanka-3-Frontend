name: CD

on:
  push:
    branches: [main]

jobs:
  build-and-push:
    name: Build & Push (frontend)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        run: |
          # Publish under the org/owner the workflow runs in (raf-si-2025 on the
          # shared upstream repo). GHCR namespaces must be lowercase.
          OWNER="${{ github.repository_owner }}"
          OWNER="${OWNER,,}"
          IMAGE="ghcr.io/${OWNER}/exbanka-3-frontend"
          # Tag every build with the immutable 7-char commit SHA so deploys are
          # traceable and rollback-able, and also move :latest to the same build
          # so anything still pulling :latest keeps working.
          SHA_TAG="${IMAGE}:${GITHUB_SHA::7}"
          LATEST_TAG="${IMAGE}:latest"
          docker build -t "$SHA_TAG" -t "$LATEST_TAG" .
          docker push "$SHA_TAG"
          docker push "$LATEST_TAG"
